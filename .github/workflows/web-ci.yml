name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/web-ssr/**"
      - "packages/**"
      - "configs/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web
        run: pnpm build:web

      - name: Build SSR
        run: pnpm build:ssr

      - name: Test
        run: pnpm test
